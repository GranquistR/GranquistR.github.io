<script>
  //routing options
  var routes = ["home", "personalprojects", "about", "contactme", "workhistory"];

  //Routing
  $(document).ready(function () {
    $("#header").load("./Components/Header.html");
    try {
      var location = window.location.href.split("?")[1];
      if (location == "" || location == undefined) {
        $("#content").load("./Views/home.html");
      } else {
        if (routes.includes(location) == false) {
          $("#content").load("./Views/notfound.html");
        } else {
          $("#content").load("./Views/" + location + ".html");
        }
      }
    } catch {
      $("#content").load("./Views/notfound.html");
    }
    $("#footer").load("./Components/Footer.html");
  });
</script>
<!-- App body -->
<div id="header"></div>
<div id="content"></div>
<div id="footer"></div>
