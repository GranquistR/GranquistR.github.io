<script>
  //each button should append its name to the url as a param
  //then the app should read the param and load the appropriate view
  $(document).ready(function () {
    $(".link").click(function () {
      var location = $(this).text().toLowerCase().replace(/\s/g, "");
      if (location == "home") {
        window.location.href = "?";
      } else {
        window.location.href = "?" + location;
      }
    });
  });
</script>
