<script>
  //each button should append its name to the url as a param
  //then the app should read the param and load the appropriate view
  $(document).ready(function () {
    $(".link").click(function () {
      var location = $(this).text().toLowerCase().replace(/\s/g, "");
      if (location == "home") {
        window.location.href = "?";
      } else {
        window.location.href = "?" + location;
      }
    });
  });

  //window resize for switch between mobile and desktop
  window.addEventListener("resize", resizeWindow);
  function resizeWindow(){
    if(window.innerWidth > 860){
      $(".bar .link").show();
      $(".bar .menu").hide();
      $(".dropdown").hide();
    }else{
      $(".bar .link").hide();
      $(".bar .menu").show();
    }
  };
  resizeWindow();

  //menu button
  $(".menu").click(function(){
    $(".dropdown").toggle();
  });
  $(".dropdown").hide();
</script>
